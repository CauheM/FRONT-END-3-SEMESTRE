<!DOCTYPE html>
<html lang="PT-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ContactForm - Cadastro</title>
    <link rel="shortcut icon" href="./IMAGES/download (11).jpeg" type="image/x-icon">
    <link rel="stylesheet" href="./CSS/style.css">
    <script src="./JS/script.js"></script>
</head>
<body>  
    <header class="header">
        <div class="container container--flex-column">
          <article class="imagens-titulo">
             <img class="header__imagens" src="./IMAGES/icons8-jerry-512 1.svg" alt="icone do site">
          </article>   
        <h1 class="header__title">Contact Form</h1>
        <p class="header__text">Insira os dados do contato e clique em cadastrar</p>      
        </div>
        
    <main>
        <div class="container">

            <form class="contact-form" action="">

                <div class="contact-form__linha">

                    <div class="contact-form__col-a">
                        <label class="contact-form__label" for="nome">Nome</label>
                    </div>

                    <div class="contact-form__col-b">
                        <input class="contact-form__input contact-form__input--metade" name="nome" id="nome" placeholder="Nome" type="text">
                        <input class="contact-form__input contact-form__input--metade" name="sobrenome" id="sobrenome" placeholder="Sobrenome" type="text">
                    </div>

                </div>

                <div class="contact-form__linha">

                    <div class="contact-form__col-a">
                        <label class="contact-form__label" for="email">Email</label>
                    </div>

                    <div class="contact-form__col-b">
                        <input class="contact-form__input contact-form__input--tamanho" name="email" id="email" placeholder="Email" type="email">
                    </div>

                </div>

                <div class="contact-form__linha">

                    <div class="contact-form__col-a">
                        <label class="contact-form__label" for="telefone">Telefone</label>
                    </div>

                    <div class="contact-form__col-b">
                        <input class="contact-form__input contact-form__input--tres-metades" name="telefone1" id="pais" placeholder="+55" type="tel">
                        <input class="contact-form__input contact-form__input--tres-metades" name="telefone2" id="ddd" placeholder="DDD" type="tel">
                        <input class="contact-form__input contact-form__input--tres-metades" name="telefone3" id="telefone" placeholder="Ex: 99999-9999" type="tel">
                    </div>

                </div>

                <div class="contact-form__linha">

                    <div class="contact-form__col-a">
                        <label class="contact-form__label" for="endereco">Endereco</label>
                    </div>

                    <div class="contact-form__col-c">
                        <input class="contact-form__input contact-form__input--tres-metades2" name="endereco7" id="cep" placeholder="CEP" type="text" onblur="buscarEndereco(this.value)">
                        <input class="contact-form__input contact-form__input--metade2" name="endereco1" id="endereco" placeholder="Rua Lá de Casa" type="text">
                        <input class="contact-form__input contact-form__input--tres-metades2" name="endereco2" id="NR" placeholder="Ex: 555" type="text">

                        <input class="contact-form__input contact-form__input--tres-metades2" name="endereco3" id="lugar" placeholder="Apto: 67" type="text">
                        <input class="contact-form__input contact-form__input--tres-metades2" name="endereco4" id="bairro" placeholder="Bairro" type="text">
                        <input class="contact-form__input contact-form__input--tres-metades2" name="endereco5" id="cidade" placeholder="Cidade" type="text">

                        <input class="contact-form__input contact-form__input--tres-metades2" name="endereco6" id="estado" placeholder="Estado" type="text">
                    </div>
                </div>

                <div class="contact-form__linha">

                    <div class="contact-form__col-a">
                        <label class="contact-form__label" for="anotacoes">Anotações</label>
                    </div>

                    <div class="contact-form__col-b">
                        <textarea class="contact-form__input contact-form__input--tamanho3" name="anotacoes" id="anotacoes" placeholder="Digite suas anotações"></textarea>
                    </div>

                </div>      

            </form>

            <article class="contact-button">
                <button class="contact-button__cadastro" onclick="validarFormulario()" type="submit">Cadastrar</button>
                <button class="contact-button__Limpar" type="reset">Limpar</button>
            </article>

        </div>

    </main>
</body> 

</html>
